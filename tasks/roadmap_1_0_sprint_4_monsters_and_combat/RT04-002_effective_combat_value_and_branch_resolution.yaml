goal: Compute effective combat value and resolve avoid, probe, fight, flee, and exploit-rule
  branches.
business_value: Keeps combat high-risk and rule-aware instead of becoming a dominant
  RPG subsystem.
dependencies:
- RT04-001
acceptance_criteria:
- Combat resolution accounts for visible stats, psych state, world state, and weakness
  knowledge.
- Exploit-rule and probe branches can outperform direct fighting when the player reads
  the rules correctly.
- Combat can change HP, SAN, FEAR, COR, and AGGRO.
constraints:
- Direct fighting must remain viable but not optimal by default.
- Do not collapse all combat outcomes into a single damage race.
